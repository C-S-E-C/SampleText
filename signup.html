<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
    <script src="basic.min.js"></script>
    <script src="crypto.min.js"></script>
    <script>
        if (isWeChat()) {
            document.getElementById("secret-display").style.overflow = "scroll";
        }
        async function Signup() {
            const username = document.getElementById("username").value;
            if (!username) {
                alert("Please enter a username");
                return;
            }

            // 本地存储
            localStorage.setItem('userid', username);

            // 界面切换
            document.getElementById("signup").style.display = "none";
            document.getElementById("secret-display").value = secret; // 使用 .value 针对 textarea
            document.getElementById("success").style.display = "block";
        }
    </script>
</head>

<body>
    <div id="signup" style="margin-top: 50px; text-align: center;">
        <h1>Signup</h1>
        <input type="text" id="username" placeholder="Username" style="padding: 8px;">
        <button onclick="Signup()" style="padding: 8px 16px;">Signup</button>
        <p id="note"></p>
    </div>

    <div id="success" style="display: none; text-align: center; margin-top: 20px;">
        <h1 style="color: green;">Signup successful!</h1>
        <h2>You may need to save the code below for account recovery:</h2>
        
        <div style="margin-bottom: 10px;">
            <button onclick="copyToClipboard(document.getElementById('secret-display').value)">Copy to clipboard</button>
            <button onclick="download(document.getElementById('secret-display').value, 'skill-bound-account-recovery-secret.txt', 'text/plain')">Download as file</button>
        </div>

        <textarea id="secret-display" readonly 
            style="width: 575px; height: 300px; resize: none; padding: 10px; font-family: monospace; overflow: hidden;">
        </textarea>
    </div>
</body>
</html>
