<!DOCTYPE html>
<html>
    <head>
        <script src="totp.js"></script>
        <script>
            function wait(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            async function Signup() {
                var username = document.getElementById("username").value;
                var secret = generateRandomBase32Secret(1024);
                const totp = new TOTP(secret, { period: 30, digits: 8, algorithm: 'SHA1' });
                var time = totp.getRemainingSeconds();
                console.log("Username: " + username);
                console.log(secret);
                if (time < 5) {
                    await wait(time * 1000);
                }
                console.log("time: " + totp.getRemainingSeconds());
                console.log("TOTP: " + totp.generate());
                console.log(totp.verify(totp.generate()));
                localStorage.setItem('userid', username);
                localStorage.setItem('secret', secret);
            }
        </script>
    </head>
    <body>
        <div id="signup">
            <h1>Signup</h1>
            <input type="text" id="username" placeholder="Username">
            <button onclick="Signup()">Signup</button>
        </div>
    </body>
</html>
